<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="430" viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg">
  <title>Prompt para Código</title>
  <desc>Um pedido em linguagem natural — comparar a idade entre grupos por teste t — vira, à direita, o código que executa a análise.</desc>
  <defs>
    <style>
      .s{font-family:'Inter',system-ui,sans-serif;}
      .m{font-family:'JetBrains Mono',monospace;}
      .ink{fill:#2A2622;} .mut{fill:#8A8175;} .clay{fill:#C15F3C;} .paper{fill:#F2ECE3;}
    </style>
  </defs>
  <rect x="0" y="0" width="820" height="430" fill="#F6F3EC"/>

  <!-- título -->
  <text x="410" y="56" text-anchor="middle" class="s clay" font-size="30" font-weight="700">Prompt &#8594; Código</text>

  <!-- card esquerdo: linguagem natural -->
  <rect x="60" y="120" width="300" height="180" rx="14" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="210" y="156" text-anchor="middle" class="s mut" font-size="12" letter-spacing="0.4">PROMPT EM LINGUAGEM NATURAL</text>
  <text x="210" y="205" text-anchor="middle" class="s ink" font-size="16" font-style="italic">“Compare a idade entre</text>
  <text x="210" y="230" text-anchor="middle" class="s ink" font-size="16" font-style="italic">os grupos por teste t”</text>

  <!-- seta -->
  <line x1="378" y1="210" x2="440" y2="210" stroke="#2A2622" stroke-width="2" stroke-linecap="round"/>
  <path d="M436,203 L446,210 L436,217" fill="none" stroke="#2A2622" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- card direito: janela de código -->
  <rect x="460" y="120" width="300" height="180" rx="14" fill="#26211D" stroke="#2A2622" stroke-width="0.8"/>
  <circle cx="484" cy="146" r="5" fill="#C15F3C"/>
  <circle cx="502" cy="146" r="5" fill="#5c5148"/>
  <circle cx="520" cy="146" r="5" fill="#5c5148"/>
  <text x="740" y="150" text-anchor="end" class="s mut" font-size="11" letter-spacing="0.4">CÓDIGO</text>
  <line x1="476" y1="164" x2="744" y2="164" stroke="#43392F" stroke-width="1"/>
  <text x="484" y="196" class="m" font-size="14" fill="#F2ECE3">t.test(idade ~ grupo,</text>
  <text x="484" y="220" class="m" font-size="14" fill="#F2ECE3">       data = dados)</text>
  <text x="484" y="258" class="m" font-size="13" fill="#C79A6B">t = 2.84,  p = 0.006</text>

  <text x="410" y="358" text-anchor="middle" class="s mut" font-size="13" font-style="italic">o pedido em português; a IA escreve o código que roda a análise</text>
</svg>
