<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="1000" viewBox="0 0 680 1000" xmlns="http://www.w3.org/2000/svg">
  <title>Capa — Do Chat ao Cowork e Code</title>
  <desc>Capa tipografica em fundo grafite, com moldura terracota, titulo em tres familias tipograficas (serifa, sans, mono) e um degrau de tres blocos.</desc>

  <!-- Paleta: grafite #26211D | texto claro #F2ECE3 | terracota #C15F3C | apagado #9A8E80 | linha #4A423B -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .serif { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; }
      .sans  { font-family: 'Inter', system-ui, Arial, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .light { fill: #F2ECE3; }
      .muted { fill: #9A8E80; }
      .clay  { fill: #C15F3C; }
    </style>
  </defs>

  <!-- Fundo (grafite) -->
  <rect x="0" y="0" width="680" height="1000" fill="#26211D"/>

  <!-- Moldura -->
  <rect x="46" y="46" width="588" height="908" fill="none" stroke="#C15F3C" stroke-width="1.5"/>

  <!-- Degrau (Chat -> Cowork -> Code) -->
  <rect x="296" y="150" width="12" height="12" class="clay"/>
  <rect x="316" y="144" width="18" height="18" class="clay"/>
  <rect x="342" y="136" width="26" height="26" class="clay"/>

  <!-- Kicker -->
  <text x="340" y="212" text-anchor="middle" class="sans muted" font-size="14" letter-spacing="4">TRABALHANDO COM O CLAUDE</text>

  <!-- Regua vertical -->
  <rect x="84" y="300" width="3" height="268" class="clay"/>

  <!-- Titulo (cada produto na sua tipografia) -->
  <text x="108" y="362"><tspan class="serif muted" font-size="34" font-style="italic">Do </tspan><tspan class="serif light" font-size="82" font-weight="600">Chat</tspan></text>
  <text x="108" y="452"><tspan class="sans muted" font-size="34">ao </tspan><tspan class="sans light" font-size="82" font-weight="500">Cowork</tspan></text>
  <text x="108" y="542"><tspan class="mono muted" font-size="34">e </tspan><tspan class="mono light" font-size="78" font-weight="500">Code</tspan></text>

  <!-- Subtitulo -->
  <text x="108" y="624" class="sans light" font-size="20">colaboração, automação e desenvolvimento</text>
  <text x="108" y="652" class="sans light" font-size="20">com agentes de IA</text>

  <!-- Divisor -->
  <line x1="84" y1="706" x2="596" y2="706" stroke="#4A423B" stroke-width="1"/>

  <!-- Publico -->
  <text x="108" y="742" class="sans muted" font-size="16">Para professores e estudantes universitários</text>

  <!-- Autoria -->
  <text x="108" y="892" class="sans muted" font-size="14" letter-spacing="2">ESCRITO POR</text>
  <text x="108" y="922" class="serif light" font-size="30">Henrique Alvarenga</text>
</svg>
