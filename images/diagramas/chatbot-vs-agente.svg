<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <title>Chatbot versus agente</title>
  <desc>Comparacao entre o assistente que responde em uma ida e volta e o colaborador que age em varias etapas.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2A2622" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .s{font-family:'Inter',system-ui,sans-serif;}
      .ink{fill:#2A2622;} .mut{fill:#8A8175;}
    </style>
  </defs>
  <rect x="0" y="0" width="680" height="340" fill="#F6F3EC"/>
  <text x="40" y="40" class="s ink" font-size="16" font-weight="500">Duas relações com a máquina</text>

  <rect x="40" y="64" width="290" height="250" rx="10" fill="none" stroke="#8A8175" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="185" y="92" text-anchor="middle" class="s ink" font-size="14" font-weight="500">Assistente que responde</text>
  <rect x="90" y="120" width="190" height="46" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="185" y="148" text-anchor="middle" class="s ink" font-size="14">Você pergunta</text>
  <line x1="185" y1="166" x2="185" y2="194" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="90" y="196" width="190" height="46" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="185" y="224" text-anchor="middle" class="s ink" font-size="14">Ele responde</text>
  <text x="185" y="290" text-anchor="middle" class="s mut" font-size="12">uma ida e volta</text>

  <rect x="350" y="64" width="290" height="250" rx="10" fill="none" stroke="#C15F3C" stroke-width="1"/>
  <text x="495" y="92" text-anchor="middle" class="s ink" font-size="14" font-weight="500">Colaborador que age</text>
  <rect x="378" y="112" width="234" height="42" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="495" y="138" text-anchor="middle" class="s ink" font-size="14">Você define o objetivo</text>
  <line x1="495" y1="154" x2="495" y2="170" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="378" y="172" width="234" height="42" rx="8" fill="#F4E3DA" stroke="#C15F3C" stroke-width="0.8"/>
  <text x="495" y="198" text-anchor="middle" class="s ink" font-size="14">Lê, decide, usa ferramentas</text>
  <line x1="495" y1="214" x2="495" y2="230" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="378" y="232" width="234" height="42" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="495" y="258" text-anchor="middle" class="s ink" font-size="14">Entrega o resultado</text>
  <text x="495" y="300" text-anchor="middle" class="s mut" font-size="12">várias etapas, com autonomia</text>
</svg>
