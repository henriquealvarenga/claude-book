<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <title>O loop do agente</title>
  <desc>Ciclo do agente com três estágios que se repetem: raciocinar (ler o contexto e decidir), agir com uma ferramenta e observar o resultado, voltando ao início a cada volta.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2A2622" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .s{font-family:'Inter',system-ui,sans-serif;}
      .ink{fill:#2A2622;} .mut{fill:#8A8175;}
    </style>
  </defs>
  <rect x="0" y="0" width="680" height="320" fill="#F6F3EC"/>
  <text x="40" y="40" class="s ink" font-size="16" font-weight="500">O loop do agente</text>

  <!-- Raciocinar (topo esquerda) -->
  <rect x="95" y="90" width="160" height="52" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="175" y="116" text-anchor="middle" class="s ink" font-size="15">Raciocinar</text>
  <text x="175" y="133" text-anchor="middle" class="s mut" font-size="10.5">lê o contexto e decide</text>

  <!-- Agir (topo direita, destacado) -->
  <rect x="425" y="90" width="160" height="52" rx="8" fill="#F4E3DA" stroke="#C15F3C" stroke-width="0.8"/>
  <text x="505" y="116" text-anchor="middle" class="s ink" font-size="15">Agir</text>
  <text x="505" y="133" text-anchor="middle" class="s mut" font-size="10.5">usa uma ferramenta</text>

  <!-- Observar (base central) -->
  <rect x="260" y="238" width="160" height="52" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="340" y="264" text-anchor="middle" class="s ink" font-size="15">Observar</text>
  <text x="340" y="281" text-anchor="middle" class="s mut" font-size="10.5">recebe o resultado</text>

  <!-- Setas do ciclo: raciocinar -> agir -> observar -> raciocinar -->
  <line x1="255" y1="116" x2="425" y2="116" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="520" y1="144" x2="420" y2="245" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="255" x2="160" y2="144" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="340" y="195" text-anchor="middle" class="s mut" font-size="12" font-style="italic">repete a cada volta</text>
</svg>
