<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="430" viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg">
  <title>O harness (o arreio)</title>
  <desc>O modelo, que só transforma texto em texto, no centro, ligado por curvas às quatro peças do harness — laço de execução, ferramentas, montagem de contexto e permissões. Um pedido entra de um lado; um artefato sai do outro.</desc>
  <defs>
    <style>
      .s{font-family:'Inter',system-ui,sans-serif;}
      .ink{fill:#2A2622;} .mut{fill:#8A8175;} .clay{fill:#C15F3C;}
    </style>
  </defs>
  <rect x="0" y="0" width="760" height="430" fill="#F6F3EC"/>

  <!-- título -->
  <text x="380" y="54" text-anchor="middle" class="s clay" font-size="30" font-weight="700" letter-spacing="0.3">o harness — o arreio</text>

  <!-- moldura do harness -->
  <rect x="125" y="82" width="510" height="292" rx="16" fill="none" stroke="#C15F3C" stroke-width="1.4" stroke-dasharray="6 5"/>

  <!-- conectores curvos das quatro peças ao modelo -->
  <path d="M345,154 Q311,180 310,208" fill="none" stroke="#2A2622" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M345,300 Q311,276 310,248" fill="none" stroke="#2A2622" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M415,154 Q449,180 450,208" fill="none" stroke="#2A2622" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M415,300 Q449,276 450,248" fill="none" stroke="#2A2622" stroke-width="1.6" stroke-linecap="round"/>

  <!-- modelo (centro) -->
  <rect x="310" y="196" width="140" height="64" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="1"/>
  <text x="380" y="222" text-anchor="middle" class="s ink" font-size="15" font-weight="500">Modelo</text>
  <text x="380" y="241" text-anchor="middle" class="s mut" font-size="10.5">texto entra · texto sai</text>

  <!-- quatro peças em volta -->
  <rect x="150" y="100" width="200" height="54" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="250" y="124" text-anchor="middle" class="s ink" font-size="13.5">Laço de execução</text>
  <text x="250" y="140" text-anchor="middle" class="s mut" font-size="10">raciocina · age · observa</text>

  <rect x="410" y="100" width="200" height="54" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="510" y="124" text-anchor="middle" class="s ink" font-size="13.5">Ferramentas</text>
  <text x="510" y="140" text-anchor="middle" class="s mut" font-size="10">ler, escrever, rodar comando</text>

  <rect x="150" y="300" width="200" height="54" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="250" y="324" text-anchor="middle" class="s ink" font-size="13.5">Montagem de contexto</text>
  <text x="250" y="340" text-anchor="middle" class="s mut" font-size="10">o que ele vê a cada volta</text>

  <rect x="410" y="300" width="200" height="54" rx="8" fill="#FCFAF6" stroke="#2A2622" stroke-width="0.8"/>
  <text x="510" y="324" text-anchor="middle" class="s ink" font-size="13.5">Permissões</text>
  <text x="510" y="340" text-anchor="middle" class="s mut" font-size="10">o que faz antes de perguntar</text>

  <!-- entrada / saída (a força vira trabalho útil) -->
  <text x="40" y="216" class="s mut" font-size="19" font-weight="700">Pedido</text>
  <line x1="42" y1="232" x2="120" y2="232" stroke="#8A8175" stroke-width="2.5" stroke-linecap="round"/>
  <text x="720" y="216" text-anchor="end" class="s mut" font-size="19" font-weight="700">Artifact</text>
  <line x1="640" y1="232" x2="718" y2="232" stroke="#8A8175" stroke-width="2.5" stroke-linecap="round"/>

  <text x="380" y="405" text-anchor="middle" class="s mut" font-size="11.5" font-style="italic">o modelo é a força; o arreio a converte em trabalho útil</text>
</svg>
