<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
  <title>Modos de permissao</title>
  <desc>Cinco modos numa escala do mais controlado ao mais autonomo: planejamento, solicitar permissoes, aceitar edicoes, automatico e ignorar permissoes.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8A8175" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .s{font-family:'Inter',system-ui,sans-serif;}
      .ink{fill:#2A2622;} .mut{fill:#8A8175;} .lt{fill:#F6F3EC;}
    </style>
  </defs>
  <rect x="0" y="0" width="680" height="240" fill="#F6F3EC"/>
  <text x="40" y="40" class="s ink" font-size="16" font-weight="500">Modos de permissão: do mais controlado ao mais autônomo</text>

  <rect x="42"  y="84" width="112" height="70" rx="8" fill="#F0E2D9" stroke="#C15F3C" stroke-width="0.6"/>
  <text x="98" y="116" text-anchor="middle" class="s ink" font-size="12">Modo de</text>
  <text x="98" y="132" text-anchor="middle" class="s ink" font-size="12">planejamento</text>
  <rect x="160" y="84" width="112" height="70" rx="8" fill="#E6C9B9" stroke="#C15F3C" stroke-width="0.6"/>
  <text x="216" y="116" text-anchor="middle" class="s ink" font-size="12">Solicitar</text>
  <text x="216" y="132" text-anchor="middle" class="s ink" font-size="12">permissões</text>
  <rect x="278" y="84" width="112" height="70" rx="8" fill="#DCB099" stroke="#C15F3C" stroke-width="0.6"/>
  <text x="334" y="116" text-anchor="middle" class="s ink" font-size="12">Aceitar</text>
  <text x="334" y="132" text-anchor="middle" class="s ink" font-size="12">edições</text>
  <rect x="396" y="84" width="112" height="70" rx="8" fill="#D08E6F" stroke="#C15F3C" stroke-width="0.6"/>
  <text x="452" y="116" text-anchor="middle" class="s ink" font-size="12">Modo</text>
  <text x="452" y="132" text-anchor="middle" class="s ink" font-size="12">automático</text>
  <rect x="514" y="84" width="112" height="70" rx="8" fill="#C15F3C" stroke="#C15F3C" stroke-width="0.6"/>
  <text x="570" y="116" text-anchor="middle" class="s lt" font-size="12">Ignorar</text>
  <text x="570" y="132" text-anchor="middle" class="s lt" font-size="12">permissões</text>

  <line x1="42" y1="182" x2="626" y2="182" stroke="#8A8175" stroke-width="1" marker-end="url(#a)"/>
  <text x="42" y="204" text-anchor="start" class="s mut" font-size="12">mais controle</text>
  <text x="626" y="204" text-anchor="end" class="s mut" font-size="12">mais autonomia / mais risco</text>
  <text x="340" y="228" text-anchor="middle" class="s mut" font-size="11">tons mais escuros indicam mais autonomia</text>
</svg>
