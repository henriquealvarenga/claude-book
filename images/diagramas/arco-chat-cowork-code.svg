<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <title>O arco Chat, Cowork e Code como escala de autonomia</title>
  <desc>Tres caixas ascendentes da esquerda para a direita: Chat, Cowork e Code, indicando autonomia crescente.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2A2622" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .s{font-family:'Inter',system-ui,sans-serif;}
      .ink{fill:#2A2622;} .mut{fill:#8A8175;}
    </style>
  </defs>
  <rect x="0" y="0" width="680" height="320" fill="#F6F3EC"/>
  <text x="40" y="44" class="s ink" font-size="16" font-weight="500">Uma escala de autonomia: do Chat ao Cowork ao Code</text>

  <rect x="60" y="200" width="150" height="72" rx="8" fill="#FCFAF6" stroke="#C15F3C" stroke-width="1"/>
  <text x="135" y="232" text-anchor="middle" class="s ink" font-size="20" font-weight="500">Chat</text>
  <text x="135" y="254" text-anchor="middle" class="s mut" font-size="12">conversar</text>

  <rect x="265" y="150" width="150" height="72" rx="8" fill="#FCFAF6" stroke="#C15F3C" stroke-width="1"/>
  <text x="340" y="182" text-anchor="middle" class="s ink" font-size="20" font-weight="500">Cowork</text>
  <text x="340" y="204" text-anchor="middle" class="s mut" font-size="12">colaborar</text>

  <rect x="470" y="100" width="150" height="72" rx="8" fill="#FCFAF6" stroke="#C15F3C" stroke-width="1"/>
  <text x="545" y="132" text-anchor="middle" class="s ink" font-size="20" font-weight="500">Code</text>
  <text x="545" y="154" text-anchor="middle" class="s mut" font-size="12">automatizar</text>

  <line x1="212" y1="206" x2="263" y2="182" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="417" y1="156" x2="468" y2="132" stroke="#2A2622" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="60" y1="296" x2="620" y2="296" stroke="#8A8175" stroke-width="1" marker-end="url(#a)"/>
  <text x="340" y="314" text-anchor="middle" class="s mut" font-size="12">mais autonomia delegada ao agente</text>
</svg>
